spring:
  application:
    name: db-dev-example
  datasource:
    url: jdbc:mysql://localhost:3306/test?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource

    # Druid 特有配置
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1 FROM DUAL
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall,slf4j  # 启用监控统计、SQL防火墙、日志
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
      use-global-data-source-stat: true
      filter:
        stat:
          slow-sql-millis: 1
          slow-sql-log-level: info
          log-slow-sql: true
        wall:
          enabled: true
          config:
            delete-where-none-check: false
      statViewServlet: # Druid监控页面配置
        enabled: true # 启用Druid监控页面
        login-username: root # 监控页面登录用户名
        login-password: root # 监控页面登录密码
        url-pattern: /druid/* # 监控页面的访问URL路径
        reset-enable: true
        allow: 127.0.0.1
      web-stat-filter:
        enabled: true
        session-stat-enable: true
        session-stat-max-count: 1000
        url-pattern: /*



db:
  dev:
    enabled: true
    ui-path: /db-dev
    sql:
      read-only: true
      max-rows: 500
    security:
      enabled: false
      username: admin
      password: 123456
    # AI 配置
    ai:
      enabled: true  # 默认关闭，需要时开启
      provider: deepseek  # modelscope 或 deepseek
      modelscope:
        api-key: ${DASHSCOPE_API_KEY:}  # 从环境变量读取或在此配置
        model: qwen-turbo  # 可选: qwen-turbo, qwen-plus, qwen-max
        temperature: 0.7
        max-tokens: 2000
      deepseek:
        api-key: ${DEEPSEEK_API_KEY:}
        model: deepseek-chat
        temperature: 0.7
        max-tokens: 2000
      timeout: 30
      max-retries: 3

server:
  port: 5555

logging:
  level:
    com.dbdev: DEBUG

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl